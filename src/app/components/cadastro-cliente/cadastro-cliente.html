<div class="layout">
  <app-sidebar></app-sidebar>

  <div class="main">
    <h2>Cadastro de Clientes</h2>

    <div class="card">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" [(ngModel)]="nome" placeholder="Ex: João Silva">
      </div>
      <div class="field">
        <label>CPF</label>
        <input type="text" [(ngModel)]="cpf" placeholder="Ex: 000.000.000-00" maxlength="14">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="text" [(ngModel)]="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" [(ngModel)]="email" placeholder="Ex: joao@email.com">
      </div>

      <button class="btn" (click)="salvar()">Salvar Cliente</button>
      <div class="msg" [class.ok]="msgOk" *ngIf="msg">{{ msg }}</div>
    </div>

    <h3>Clientes cadastrados</h3>
    <table>
      <thead>
        <tr>
          <th>Nome</th><th>CPF</th><th>Telefone</th><th>E-mail</th><th>Ação</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of clientes">
          <td>{{ c.nome }}</td>
          <td>{{ c.cpf }}</td>
          <td>{{ c.telefone }}</td>
          <td>{{ c.email }}</td>
          <td><button class="btn-excluir" (click)="excluir(c.id)">🗑 Excluir</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
